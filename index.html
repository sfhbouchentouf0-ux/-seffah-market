<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Seffah Market</title>

<style>
body{
  font-family: Arial;
  margin:0;
  direction: rtl;
  overflow-x:hidden;
  background:#f4f6f8;
}

/* الخلفية */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1523275335684-37898b6baf30") no-repeat center/cover;
  opacity:0.10;
  z-index:-1;
}

/* الهيدر */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
  color:white;
  background:rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
}

header img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:12px;
}

.header-text{
  flex:1;
  margin-right:15px;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
}

.header-text h1{
  margin:0;
  font-size:24px;
}

/* البحث */
.search-box{
  padding:20px;
}

.search-wrapper{
  position:relative;
  width:85%;
  margin:auto;
}

.search-wrapper input{
  width:100%;
  padding:12px 40px 12px 12px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
}

.search-icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
}

/* المنتجات */
.products{
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.product{
  background:white;
  border-radius:15px;
  text-align:center;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:0.3s;
  position:relative;
}

.product:hover{
  transform:translateY(-6px);
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  font-size:12px;
  border-radius:8px;
}

.product img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.product h3{
  margin:10px 0 5px;
}

.old-price{
  text-decoration: line-through;
  color:red;
}

.new-price{
  color:green;
  font-size:18px;
  font-weight:bold;
}

button{
  background:#111;
  color:white;
  border:none;
  padding:10px;
  width:90%;
  margin:10px auto 15px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:green;
}

/* الفورم */
#formBox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.form{
  background:#fff;
  width:90%;
  max-width:400px;
  margin:80px auto;
  padding:15px;
  border-radius:12px;
}

.form p{
  color:green;
  font-weight:bold;
  text-align:center;
  margin:5px 0 10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

.btn{
  background:green;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
}

.close{
  background:red;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  margin-top:5px;
  border-radius:8px;
}
</style>

</head>

<body>

<header>
  <img src="https://images.unsplash.com/photo-1580915411954-282cb1b0d780">

  <div class="header-text">
    <h1>Seffah Market ✨</h1>
    <p>أفضل العروض والتخفيضات 🛒🔥</p>
  </div>
</header>

<!-- البحث -->
<div class="search-box">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" onkeyup="searchProducts()" placeholder="ابحث عن منتوج...">
  </div>
</div>

<!-- المنتجات -->
<div class="products">

  <div class="product">
    <span class="badge">-40%</span>
    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
    <h3>سماعات بلوتوث</h3>
    <p class="old-price">5000 دج</p>
    <p class="new-price">3000 دج 🔥</p>
    <button onclick="openForm()">شراء</button>
  </div>

  <div class="product">
    <span class="badge">-30%</span>
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
    <h3>هاتف ذكي</h3>
    <p class="old-price">7000 دج</p>
    <p class="new-price">4500 دج 🔥</p>
    <button onclick="openForm()">شراء</button>
  </div>

</div>

<!-- الفورم -->
<div id="formBox">
<div class="form">

<h3>معلومات الطلب</h3>

<p>🚚 توصيل مجاني لجميع الولايات</p>

<input type="text" placeholder="الاسم">
<input type="text" placeholder="اللقب">
<input type="text" placeholder="الولاية">
<input type="text" placeholder="العنوان">

<select>
<option>نوع التوصيل</option>
<option>منزل</option>
<option>مكتب</option>
</select>

<input type="text" placeholder="رقم الهاتف">

<button class="btn" onclick="order()">تأكيد الطلب</button>
<button class="close" onclick="closeForm()">إغلاق</button>

</div>
</div>

<script>
function openForm(){
document.getElementById("formBox").style.display="block";
}

function closeForm(){
document.getElementById("formBox").style.display="none";
}

function order(){
alert("تم إرسال الطلب بنجاح ✅");
}

function searchProducts(){
let input = document.getElementById("search").value.toLowerCase();
let products = document.querySelectorAll(".product");

products.forEach(p=>{
p.style.display = p.innerText.toLowerCase().includes(input) ? "block" : "none";
});
}
</script>

</body>
</html>
